name: Build Binary from Dockerfile

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build using Docker
        run: |
          docker build --target builder -t new-api-builder .
          docker create --name extract new-api-builder
          docker cp extract:/app/new-api ./new-api
          docker rm extract

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: new-api-linux-amd64
          path: new-api
