name: Build Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build new-api binary via Docker
        run: |
          # 1. 打印当前目录结构，确认 Dockerfile 是否存在
          echo "=== 当前仓库根目录文件 ==="
          ls -la
          
          # 2. 使用多阶段构建的 builder 阶段进行编译
          echo "=== 开始 Docker 构建 ==="
          docker build --target builder -t new-api-builder . || { echo "Docker build 失败！"; exit 1; }
          
          # 3. 创建临时容器并查看内部文件结构（方便排查路径问题）
          echo "=== 检查容器内 /app 目录的文件 ==="
          docker create --name tmp-extract new-api-builder
          docker cp tmp-extract:/app/. ./app_contents  # 先把整个 app 文件夹拷出来看看有什么
          ls -la ./app_contents || true
          
          # 4. 精准提取二进制文件
          echo "=== 尝试提取二进制文件 ==="
          docker cp tmp-extract:/app/new-api ./new-api || { 
            echo "❌ 提取失败！请检查上方日志中 ./app_contents 里的真实文件名和路径。"; 
            docker rm -f tmp-extract; 
            docker rmi -f new-api-builder; 
            exit 1; 
          }
          
          # 5. 清理临时资源
          docker rm -f tmp-extract
          docker rmi -f new-api-builder
          
          # 6. 赋予执行权限并打印大小
          chmod +x ./new-api
          echo "✅ 二进制文件提取成功，文件大小为："
          ls -lh ./new-api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-linux-amd64
          path: new-api
          retention-days: 7
