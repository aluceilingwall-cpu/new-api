name: Build Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Extract
        run: |
          echo "=== 正在构建 Docker 镜像 ==="
          docker build -t new-api-built .

          echo "=== 探测容器内文件结构 ==="
          # 使用 --entrypoint 覆盖默认启动命令，防止服务运行导致超时
          docker run --rm --entrypoint /bin/sh new-api-built -c "ls -la /build /app /dist / 2>/dev/null || true"

          echo "=== 提取二进制文件 ==="
          # 创建临时容器用于复制文件
          docker create --name tmp_extract --entrypoint /bin/sh new-api-built
          
          # 优先尝试从 /build 目录提取（基于日志分析）
          if docker cp tmp_extract:/build/new-api ./new-api 2>/dev/null; then
            echo "✅ 成功从 /build/new-api 提取"
          elif docker cp tmp_extract:/app/new-api ./new-api 2>/dev/null; then
            echo "✅ 成功从 /app/new-api 提取"
          elif docker cp tmp_extract:/new-api ./new-api 2>/dev/null; then
            echo "✅ 成功从 /new-api 提取"
          else
            echo "❌ 未找到 new-api 二进制文件"
            docker rm -f tmp_extract
            exit 1
          fi

          # 清理临时容器
          docker rm -f tmp_extract

          # 设置执行权限并验证
          chmod +x ./new-api
          ls -lh ./new-api
          file ./new-api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-linux-amd64
          path: new-api
          retention-days: 7
