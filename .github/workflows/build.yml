name: Build Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Extract
        run: |
          # 1. 直接构建镜像，不依赖特定的 target
          echo "=== 正在构建 Docker 镜像 ==="
          docker build -t new-api-built .

          # 2. 启动容器并查找关键文件（比如 main.go 所在目录或可执行文件）
          echo "=== 查找容器内的文件结构 ==="
          # 尝试列出根目录和常见目录
          docker run --rm new-api-built find / -type f -name "new-api" 2>/dev/null || true
          docker run --rm new-api-built ls -la / /build /app /dist 2>/dev/null || true

          # 3. 根据查找结果，尝试提取文件
          # 策略：先尝试 /app，再尝试 /build，最后尝试根目录
          if docker run --rm new-api-built test -f /app/new-api; then
            echo "✅ 发现文件在 /app/"
            docker create --name tmp_container new-api-built
            docker cp tmp_container:/app/new-api ./new-api
            docker rm tmp_container
          elif docker run --rm new-api-built test -f /build/new-api; then
            echo "✅ 发现文件在 /build/"
            docker create --name tmp_container new-api-built
            docker cp tmp_container:/build/new-api ./new-api
            docker rm tmp_container
          else
            echo "❌ 无法找到 new-api 二进制文件！请检查 Dockerfile 的输出路径。"
            exit 1
          fi

          # 4. 设置权限并检查
          chmod +x ./new-api
          ls -lh ./new-api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api
          path: new-api
