name: Build Binary

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build new-api binary
        run: |
          docker build --target builder -t new-api .
          docker create --name tmp new-api
          docker cp tmp:/app/new-api ./new-api
          docker rm tmp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api
          path: new-api
