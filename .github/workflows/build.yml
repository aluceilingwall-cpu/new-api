name: Build Binary from Dockerfile

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build builder stage
        run: |
          docker build -t new-api-builder . --target=builder
          docker create --name temp new-api-builder
          docker cp temp:/app/new-api ./new-api
          docker rm temp

      - name: Delete old latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest -y 2>/dev/null || true

      - name: Upload binary to release
        uses: softprops/softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Binary
          files: ./new-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
