name: Build and Release Native Binary

on:
  # 1. 每天 UTC 时间 0:00 (即北京时间早上 8:00) 自动触发同步上游并检查更新
  schedule:
    - cron: '0 0 * * *'
  # 2. 支持在 GitHub 页面手动点击按钮触发
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：检出你自己的 Fork 仓库代码
      - name: Checkout my fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 2：配置 Git 用户信息（用于提交同步后的代码）
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 步骤 3：添加上游仓库并自动同步最新代码
      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream
          git checkout main
          # 尝试快进合并上游的最新代码
          git merge --ff-only upstream/main || echo "No fast-forward merge possible or already up to date."
          # 将同步后的代码推回你自己的 Fork 仓库
          git push origin main

      # 步骤 4：使用官方 Dockerfile 作为纯净环境编译原生二进制
      - name: Build native binary via Docker
        run: |
          # 利用官方 Dockerfile 构建临时镜像进行编译
          docker build -t new-api-builder .
          # 创建临时容器提取编译好的二进制文件
          docker create --name temp-extract new-api-builder
          docker cp temp-extract:/app/new-api ./new-api-linux-amd64
          docker rm temp-extract
          docker rmi new-api-builder
          
          # 赋予执行权限
          chmod +x ./new-api-linux-amd64
          echo "Binary size: $(stat -c%s ./new-api-linux-amd64) bytes"

      # 步骤 5：自动创建或更新 GitHub Release
      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Automated Build
          body: |
            🚀 自动构建的最新原生二进制文件 (Linux AMD64)。
            生成时间：$(date '+%Y-%m-%d %H:%M:%S') UTC
            基于上游 QuantumNous/new-api 最新代码自动编译。
          files: ./new-api-linux-amd64
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
