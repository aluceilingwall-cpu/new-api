name: Sync Upstream & Auto Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动执行

permissions:
  contents: write

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 1. 同步上游 ==========
      - name: Sync upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: QuantumNous/new-api
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

      # ========== 2. 🔧 强制修复 go.mod（防止被上游覆盖） ==========
      - name: Fix invalid Go version in go.mod
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          CURRENT_GO=$(grep '^go ' go.mod | awk '{print $2}')
          TARGET_GO="1.24.4"
          
          if [ "$CURRENT_GO" != "$TARGET_GO" ]; then
            echo "⚠️ Detected invalid Go version: $CURRENT_GO, fixing to $TARGET_GO..."
            sed -i "s/^go .*/go ${TARGET_GO}/" go.mod
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add go.mod
            git commit -m "chore(ci): auto-fix go.mod version to ${TARGET_GO}"
            git push
            echo "✅ go.mod fixed and pushed."
          else
            echo "✅ go.mod version is correct ($TARGET_GO), no fix needed."
          fi

      # ========== 3. 生成版本号 ==========
      - name: Generate version
        id: get_version
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="auto-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # ========== 4. 安装 Go ==========
      - name: Setup Go
        if: steps.sync.outputs.has_new_commits == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      # ========== 5. 编译二进制 ==========
      - name: Build binary
        if: steps.sync.outputs.has_new_commits == 'true'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go mod download && go mod verify
          go build \
            -ldflags="-s -w" \
            -trimpath \
            -o new-api-linux-amd64
          chmod +x new-api-linux-amd64

      # ========== 6. 自动发布 Release ==========
      - name: Create or Update Release
        if: steps.sync.outputs.has_new_commits == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: |
            🤖 Auto-synced from upstream QuantumNous/new-api
            - **Commit**: `${{ github.sha }}`
          files: new-api-linux-amd64
          draft: false
          prerelease: false
          make_latest: true
