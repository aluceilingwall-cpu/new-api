name: Sync Upstream & Auto Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动执行

permissions:
  contents: write # 必须：允许创建 Release 和上传附件

jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========== 1. 同步上游 ==========
      - name: Sync upstream
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: QuantumNous/new-api
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

      # ========== 2. 生成版本号（基于日期+Commit短Hash） ==========
      - name: Generate version
        id: get_version
        if: steps.sync.outputs.has_new_commits == 'true'
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="auto-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      # ========== 3. 安装 Go ==========
      - name: Setup Go
        if: steps.sync.outputs.has_new_commits == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      # ========== 4. 编译 amd64 二进制（纯静态编译，无版本注入） ==========
      - name: Build binary
        if: steps.sync.outputs.has_new_commits == 'true'
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go mod download && go mod verify
          go build \
            -ldflags="-s -w" \
            -trimpath \
            -o new-api-linux-amd64
          chmod +x new-api-linux-amd64

      # ========== 5. 自动创建/更新 Release ==========
      - name: Create or Update Release
        if: steps.sync.outputs.has_new_commits == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: |
            🤖 Auto-synced from upstream QuantumNous/new-api
            
            - **Commit**: `${{ github.sha }}`
            - **Build Time**: ${{ github.event.head_commit.timestamp || 'N/A' }}
          files: new-api-linux-amd64
          draft: false
          prerelease: false
          make_latest: true
